services:
  app:
    image: ghcr.io/sgrumo/quantotelarischi:latest
    container_name: quantotela-app
    restart: unless-stopped
    networks:
      - web
    env_file:
      - .env
    environment:
      PHX_SERVER: "true"
      PORT: "4000"
    healthcheck:
      test: ["CMD", "/app/bin/quantomelarischio", "rpc", "1 + 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  web:
    name: web
    external: true
